name: ReactJS Build

on:
  push:
    branches:
      - develop

jobs:
  build-react:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./ui
        run: npm install

      - name: Build React app
        working-directory: ./ui
        run: npm run build

      # Optional: Upload build folder as artifact (for debugging or deployment)
      - name: Upload build output
        uses: actions/upload-artifact@v3
        with:
          name: react-build
          path: ./ui/build
